services:

  # ========================
  # MySQL Database
  # ========================
  mysql:
    image: mysql:8.0
    container_name: smart-parking-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-smart_parking_db}
      MYSQL_USER: ${MYSQL_USER:-parking_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-parking_pass}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpass}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - parking-network

  # ========================
  # Smart Parking App
  # ========================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: smart-parking-app:latest
    container_name: smart-parking-app
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-smart_parking_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-parking_user}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-parking_pass}
      JWT_SECRET: ${JWT_SECRET:-my-secret-key-my-secret-key-my-secret-key-123456}
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - parking-network

  # ========================
  # React Frontend
  # ========================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ""
    image: smart-parking-frontend:latest
    container_name: smart-parking-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - parking-network

volumes:

  mysql_data:
    driver: local

networks:
  parking-network:
    driver: bridge
