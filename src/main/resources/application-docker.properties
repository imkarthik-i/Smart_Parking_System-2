# ============================================================
# DATABASE CONFIGURATION
# ============================================================

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/smart_parking_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:parking_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:parking_pass}

# ============================================================
# JPA / HIBERNATE
# ============================================================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ============================================================
# CONNECTION POOL (HIKARI)
# ============================================================

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ============================================================
# LOGGING
# ============================================================

logging.level.root=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql=WARN
logging.level.com.parking=INFO

# ============================================================
# ACTUATOR
# ============================================================

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# Health Probes
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# Health Groups
management.endpoint.health.group.liveness.include=livenessState
management.endpoint.health.group.readiness.include=readinessState,db

# ============================================================
# APPLICATION INFO
# ============================================================

management.info.env.enabled=true

info.app.name=Smart Parking Management System
info.app.version=1.0.0
info.app.description=Enterprise Parking Management Platform
info.app.environment=Docker

# ============================================================
# SERVER
# ============================================================

server.port=8080
server.forward-headers-strategy=framework

# ============================================================
# SWAGGER / OPENAPI
# ============================================================

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# ============================================================
# JACKSON
# ============================================================

spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.default-property-inclusion=non_null

# ============================================================
# JWT
# ============================================================

jwt.secret=${JWT_SECRET:my-secret-key-my-secret-key-my-secret-key-123456}

# ============================================================
# CORS
# ============================================================

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost,http://localhost:30080,http://192.168.49.2:30080,http://192.168.49.2:30081}