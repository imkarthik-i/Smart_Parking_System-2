spring.application.name=Smart Parking Management System

# ========================
# MySQL Configuration (overridable via env vars)
# ========================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/smart_parking_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Secret (overridable via env var)
jwt.secret=${JWT_SECRET:my-secret-key-my-secret-key-my-secret-key-123456}

# Server
spring.thymeleaf.cache=false

# Logging
logging.level.org.springframework=INFO
logging.level.com.parking=DEBUG

# ========================
# SpringDoc OpenAPI
# ========================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui

# ========================
# Actuator
# ========================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.info.env.enabled=true
management.endpoint.metrics.enabled=true

# Application Info
info.app.name=Smart Parking Management System
info.app.version=1.0
info.app.description=Enterprise Parking Management Platform built using Spring Boot, JWT Authentication, Parking Reservation, Vehicle Entry/Exit Tracking, Billing and Payment Processing

# Actuator Endpoints
management.endpoints.web.base-path=/actuator
management.endpoints.web.path-mapping.health=health
management.endpoints.web.path-mapping.info=info
management.endpoints.web.path-mapping.metrics=metrics

# Health probes
management.endpoint.health.probes.enabled=true
management.health.db.enabled=true
management.health.diskspace.enabled=true

# ========================
# CORS Configuration
# ========================
app.cors.allowed-origins=http://localhost:3000,http://localhost:3001,http://localhost:8080,http://localhost:30080,http://localhost:30081,http://127.0.0.1:3000,http://127.0.0.1:30080,http://127.0.0.1:30081,http://192.168.49.2:30080,http://192.168.49.2:30081

